name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      # ios/ ディレクトリが存在しない場合（初回）は cap add ios を実行する。
      # CocoaPods の pod install が内部で走るため初回は数分かかる。
      # 初回成功後に ios/ を git にコミットすれば以降は cap sync のみになる。
      - name: Setup Capacitor iOS project
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Install certificate and provisioning profile
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
        run: |
          # 一時キーチェーンを作成
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # P12 証明書をインポート
          P12_PATH=$RUNNER_TEMP/cert.p12
          echo "$P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # プロビジョニングプロファイルをインストール
          PROVISION_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROVISION_DIR"
          MOBILEPROVISION_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > "$MOBILEPROVISION_PATH"
          UUID=$(security cms -D -i "$MOBILEPROVISION_PATH" | plutil -extract UUID raw -)
          cp "$MOBILEPROVISION_PATH" "$PROVISION_DIR/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Archive
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE="$PROFILE_UUID"

      - name: Export IPA
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :teamID $TEAM_ID" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA to GitHub Releases
        if: ${{ secrets.IOS_P12_BASE64 != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: iOS Build ${{ github.run_number }}
          files: ${{ runner.temp }}/export/*.ipa
